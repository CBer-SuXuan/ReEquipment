# 安全里程碑设定
# 如果强化失败导致掉级，武器等级绝对不会低于以下设定的等级。
# 比如设定了 4, 8, 10，那么如果在 +11 升 +12 失败了，最多只会掉到 +10。
SafeMilestones:
  - 4
  - 8
  - 10

# 1-12 级独立 PRD 概率配置
Levels:
  1:
    baseRate: 40    # 首次强化基础概率 (40%)
    stepRate: 10    # 每次失败增加的概率 (+10%)
    maxCap: 60      # 概率绝对上限 (最高60%)
  2:
    baseRate: 35
    stepRate: 8
    maxCap: 60
