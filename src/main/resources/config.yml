#插件指令前缀
Prefix: '&6[海绵强化]'

# 淬炼成本
Cost:
  Money: 100
  MaterialAmount: 1

#声音提示，填写#视为禁用
Sound:
  # 装备升级成功
  success: 'ENTITY_ARMOR_STAND_BREAK'
  # 装备掉级
  downgrade: 'ITEM_BOTTLE_FILL'

#信息提示
Messages:
  # 初始开槽
  openTempering: ' &a装备打造已开槽.'
  # 开始淬炼
  startTempering: ' &a开始淬炼...'
  # 无法继续淬炼（装备已经顶级）
  cannotTempering: ' &a该装备已经不能再淬炼了.'
  # 空手时尝试淬炼
  emptyItem: ' &c您现在是空手!手持武器或装备再来吧! '
  # 无法淬炼的装备
  noType: ' &a该装备不是可淬炼的类型.'
  # 金币不足
  noMoney: ' &a淬炼到下一级需要{Money}金钱.'
  # 强化材料不足
  noMaterial: ' &c您已经没有足够的强化材料了!'
  # 淬炼成功
  success: ' &a恭喜你淬炼成功！'
  # 淬炼失败且掉级
  drop: ' &a很遗憾,淬炼失败,装备掉级.'

ItemName:
  DIAMOND_HELMET: '钻石头盔'
  DIAMOND_CHESTPLATE: '钻石胸甲'
  DIAMOND_LEGGINGS: '钻石护腿'
  DIAMOND_BOOTS: '钻石靴子'
  NETHERITE_HELMET: '下界合金头盔'
  NETHERITE_CHESTPLATE: '下界合金胸甲'
  NETHERITE_LEGGINGS: '下界合金护腿'
  NETHERITE_BOOTS: '下界合金靴'
  NETHERITE_AXE: '下界合金斧'
  NETHERITE_SWORD: '下界合金剑'
  IRON_AXE: '铁斧'
  DIAMOND_AXE: '钻石斧'
  DIAMOND_SWORD: '钻石剑'
  BOW: '弓箭'
  ELYTRA: '鞘翅'
  TRIDENT: '三叉戟'
  CROSSBOW: '弩箭'
  SHIELD: '盾牌'

bottomLores:
  - "材质"
  - "皮肤"

# 公告
BroadCast:
  # 是否启用
  enable: true
  # 公告内容
  messages:
    - "&a恭喜&e %player% &a将 %item% &a淬炼到了&c&l %level% &a级."
  # 当升级后的等级大于等于该等级，才发布公告
  allowLevel: 10


# 相关物品
Article:
  # 淬炼道具
  temperingTools:
    # 物品名
    displayName: "&b&l一级淬炼石"
    # 物品类型
    materialType: "DIAMOND"
    # 物品描述
    lores:
      - "&a这是一颗淬炼石"
      - "&a这真的是一颗淬炼石。"
    # 物品附魔效果，但是不会有任何属性显示。
    glow: true
    # 允许原版淬炼，无视上述的设定
    setNormal: true
